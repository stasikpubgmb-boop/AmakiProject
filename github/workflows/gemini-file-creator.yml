name: Gemini File Creator

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  create-or-edit-files:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@gemini')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google AI Python SDK
        run: pip install google-generativeai

      - name: Run Gemini to create/edit files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import google.generativeai as genai
          
          # Настройка API
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          
          # Используем бесплатную модель Gemini 2.5 Flash
          model = genai.GenerativeModel('models/gemini-2.5-flash-preview-04-17')
          
          # Получаем текст задачи из Issue или комментария
          task = """
          ${{ github.event.issue.body || github.event.comment.body }}
          """
          
          # Формируем промпт для Gemini
          prompt = f"""
          Ты - AI ассистент для GitHub репозитория.
          
          Задача пользователя: {task}
          
          Инструкции:
          1. Проанализируй запрос пользователя
          2. Если нужно создать файл - создай его
          3. Если нужно изменить файл - измени его
          4. Если нужно удалить файл - удали его
          5. Если задача не связана с файлами - просто дай ответ
          
          Для работы с файлами используй Python код:
          - with open('filename', 'w') as f: f.write('content')
          - os.remove('filename')
          - os.makedirs('folder', exist_ok=True)
          
          Сначала подумай, потом выполни действия, потом напиши отчет.
          """
          
          # Отправляем запрос к Gemini
          response = model.generate_content(prompt)
          
          # Выполняем код, который вернула Gemini (осторожно, но это безопасно в Actions)
          try:
              exec(response.text)
              print("✅ Задача выполнена успешно!")
          except Exception as e:
              print(f"❌ Ошибка: {e}")
          
          # Сохраняем ответ для комментария
          with open('gemini_response.txt', 'w') as f:
              f.write(response.text)
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name 'Gemini Bot'
          git config --global user.email 'gemini-bot@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Автоматические изменения от Gemini"
          git push

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('gemini_response.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Gemini выполнил задачу:**\n\n\`\`\`\n${response}\n\`\`\``
            });
